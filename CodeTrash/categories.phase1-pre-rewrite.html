  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    .sidebar-item { 
      transition: all 0.2s ease;
      border-right: 2px solid transparent;
    }

    .dark .category-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    
    /* Т╗џтіеТЮАуЙјтї?*/
    ::-webkit-scrollbar { width: 6px; height: 6px; }

    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

<body class="bg-gray-50 text-gray-900 dark:bg-dark-bg dark:text-gray-100 transition-colors duration-200">
  
  <!-- жАХжЃе Header -->
  <header class="sticky top-0 z-50 bg-white dark:bg-dark-surface border-b border-gray-200 dark:border-dark-border transition-colors duration-200">
    <div class="flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">

          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 dark:text-white">DevLog тљјтЈ░у«Ауљє</h1>
      </div>
      <div class="flex items-center gap-4">
        <!-- СИ╗жбўтѕЄТЇбТїЅжњ« -->

          <svg id="themeIcon" class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
        </button>
        <button onclick="goBack()" class="flex items-center gap-2 px-4 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors text-sm font-medium text-gray-700 dark:text-gray-300">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          У┐ћтЏъ
        </button>
        <button onclick="logout()" class="flex items-center gap-2 px-4 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors text-sm font-medium text-gray-700 dark:text-gray-300">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          жђђтЄ?        </button>
      </div>
    </div>
  </header>

  <div class="flex min-h-[calc(100vh-64px)]">
    <!-- СЙДУЙ╣Та?-->
    <aside class="w-64 bg-white dark:bg-dark-surface border-r border-gray-200 dark:border-dark-border sticky top-16 h-[calc(100vh-64px)] overflow-y-auto flex-shrink-0 transition-colors duration-200">
      <nav class="py-4">
        <div class="sidebar-item px-6 py-3 cursor-pointer flex items-center gap-3" onclick="goToDashboard()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
          </svg>
          <span class="font-medium">ТдѓУДѕ</span>
        </div>
        <a href="/admin/posts" class="sidebar-item px-6 py-3 cursor-pointer flex items-center gap-3" style="text-decoration: none;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          <span class="font-medium">ТќЄуФау«Ауљє</span>
        </a>
        <a href="/admin/sections" class="sidebar-item px-6 py-3 cursor-pointer flex items-center gap-3" style="text-decoration: none;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
          </svg>
          <span class="font-medium">ТаЈуЏ«у«Ауљє</span>
        </a>
        <div class="sidebar-item active px-6 py-3 cursor-pointer flex items-center gap-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
          </svg>
          <span class="font-medium">тѕєу▒╗у«Ауљє</span>
        </div>
        <div class="sidebar-item px-6 py-3 cursor-pointer flex items-center gap-3" onclick="goToTags()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
          </svg>
          <span class="font-medium">ТаЄуГЙу«Ауљє</span>
        </div>
        <div class="sidebar-item px-6 py-3 cursor-pointer flex items-center gap-3" onclick="goToSettings()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          <span class="font-medium">у│╗у╗ЪУ«Йуй«</span>
        </div>
      </nav>
    </aside>

    <!-- СИ╗тєЁт«╣тї║ -->
    <main class="flex-1 p-6 overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">тѕєу▒╗у«Ауљє</h2>
        <button onclick="openCreateModal()" class="flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-colors font-medium shadow-lg shadow-indigo-500/20">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Тќ░т╗║тѕєу▒╗
        </button>
      </div>

      <div class="bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-xl p-6 transition-colors duration-200">
        <div class="grid grid-cols-3 gap-4" id="categoryList"></div>
      </div>
    </main>
  </div>

  <!-- Тќ░т╗║/у╝ќУЙЉтѕєу▒╗ТеАТђЂТАє -->
  <div id="categoryModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
    <div class="bg-white dark:bg-dark-surface rounded-2xl p-6 w-full max-w-md mx-4 border border-gray-200 dark:border-dark-border shadow-2xl transition-colors duration-200">
      <h3 id="modalTitle" class="text-lg font-bold text-gray-900 dark:text-white mb-4">Тќ░т╗║тѕєу▒╗</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">тѕєу▒╗тљЇуД░</label>
          <input type="text" id="categoryName" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-200" placeholder="УЙЊтЁЦтѕєу▒╗тљЇуД░">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">тѕєу▒╗ТЈЈУ┐░</label>
          <textarea id="categoryDesc" rows="3" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-200" placeholder="у«ђУдЂТЈЈУ┐░У┐ЎСИфтѕєу▒?></textarea>
        </div>
        <div class="flex gap-3 pt-4">
          <button onclick="closeModal()" class="flex-1 px-4 py-2.5 bg-gray-100 dark:bg-dark-surface hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl transition-colors font-medium text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-dark-border">тЈќТХѕ</button>
          <button onclick="saveCategory()" class="flex-1 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 rounded-xl transition-colors font-medium text-white shadow-lg shadow-indigo-500/20">С┐ЮтГў</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== СИ╗жбўтѕЄТЇб ==========
    let currentTheme = localStorage.getItem('theme') || 'dark';
    
    function initTheme() {
      setTheme(currentTheme);
    }
    
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(currentTheme);
    }
    
    function setTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('theme', theme);
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');
      
      html.classList.remove('light', 'dark');
      html.classList.add(theme);
      
      if (theme === 'dark') {
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
      } else {
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
      }
    }
    
    // тѕЮтДІтїќСИ╗жб?    initTheme();

    // ========== тѕєу▒╗у«АуљєтіЪУЃй ==========
    let editingCategoryId = null;
    let categories = [];

    // тіаУййтѕєу▒╗тѕЌУАе
    async function loadCategories() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch('/api/categories', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          const data = await response.json();
          categories = data.categories || [];
          renderCategories();
        }
      } catch (error) {
        console.error('тіаУййтѕєу▒╗тц▒У┤Ц:', error);
        // Т╝ћуц║ТЋ░ТЇ«
        categories = [
          { id: 1, name: 'ТіђТю»ТЋЎуе?, description: 'у╝ќуеІтњїТіђТю»уЏИтЁ│ТќЄуФ?, count: 5 },
          { id: 2, name: 'ућЪТ┤╗жџЈугћ', description: 'ТЌЦтИИућЪТ┤╗У«░тйЋ', count: 3 },
        ];
        renderCategories();
      }
    }

    function renderCategories() {
      const container = document.getElementById('categoryList');
      if (categories.length === 0) {
        container.innerHTML = '<div class="col-span-3 text-center py-12 text-gray-500 dark:text-gray-400 transition-colors duration-200">ТџѓТЌатѕєу▒╗№╝їуѓ╣тЄ╗тЈ│СИіУДњТќ░т╗║</div>';
        return;
      }
      
      container.innerHTML = categories.map(cat => `
        <div class="category-card bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-xl p-5 cursor-pointer transition-colors duration-200" onclick="editCategory(${cat.id})">
          <div class="flex items-start justify-between mb-3">
            <div class="w-10 h-10 bg-indigo-50 dark:bg-indigo-900/20 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
              </svg>
            </div>
            <span class="text-xs text-gray-500 dark:text-gray-400">${cat.count || 0} у»ЄТќЄуФ?/span>
          </div>
          <h3 class="text-base font-bold text-gray-900 dark:text-white mb-1">${cat.name}</h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2">${cat.description || 'ТџѓТЌаТЈЈУ┐░'}</p>
        </div>
      `).join('');
    }

    function openCreateModal() {
      editingCategoryId = null;
      document.getElementById('modalTitle').textContent = 'Тќ░т╗║тѕєу▒╗';
      document.getElementById('categoryName').value = '';
      document.getElementById('categoryDesc').value = '';
      document.getElementById('categoryModal').classList.remove('hidden');
    }

    function editCategory(id) {
      editingCategoryId = id;
      const category = categories.find(c => c.id === id);
      if (category) {
        document.getElementById('modalTitle').textContent = 'у╝ќУЙЉтѕєу▒╗';
        document.getElementById('categoryName').value = category.name;
        document.getElementById('categoryDesc').value = category.description || '';
        document.getElementById('categoryModal').classList.remove('hidden');
      }
    }

    function closeModal() {
      document.getElementById('categoryModal').classList.add('hidden');
    }

    async function saveCategory() {
      const name = document.getElementById('categoryName').value.trim();
      const description = document.getElementById('categoryDesc').value.trim();
      
      if (!name) {
        alert('У»иУЙЊтЁЦтѕєу▒╗тљЇуД?);
        return;
      }

      try {
        const token = localStorage.getItem('token');
        const url = editingCategoryId ? `/api/categories/${editingCategoryId}` : '/api/categories';
        const method = editingCategoryId ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ name, description })
        });
        
        if (response.ok) {
          closeModal();
          loadCategories();
        } else {
          alert('С┐ЮтГўтц▒У┤Ц');
        }
      } catch (error) {
        console.error('С┐ЮтГўтѕєу▒╗тц▒У┤Ц:', error);
        // Т╝ћуц║№╝џТюгтю░Ти╗ті?        if (!editingCategoryId) {
          categories.push({ id: Date.now(), name, description, count: 0 });
          renderCategories();
          closeModal();
        }
      }
    }

    // т»╝УѕфтЄйТЋ░
    function goBack() { window.history.back(); }
    function goToDashboard() { window.location.href = '/admin/dashboard'; }
    function goToPosts() { window.location.href = '/admin/posts'; }
    function goToTags() { window.location.href = '/admin/tags'; }
    function goToSettings() { window.location.href = '/admin/settings'; }
    function logout() { localStorage.removeItem('token'); window.location.href = '/admin'; }

    // тѕЮтДІтї?    loadCategories();
  </script>
</body>
</html>
