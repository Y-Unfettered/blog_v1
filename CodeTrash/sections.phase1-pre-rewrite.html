  <!-- هˆ›ه»؛/ç¼–è¾‘و¨،و€پو،† -->

        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">وژ’ه؛ڈ</label>
          <input type="number" id="sectionOrder" value="0" class="w-full px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">

      <div class="flex gap-3 mt-6">

        <button type="button" onclick="saveSection()" class="flex-1 px-4 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-xl transition-colors font-medium text-white">ن؟‌ه­ک</button>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/admin';
    }

    // ن¸»é¢کهˆ‡وچ¢
    let currentTheme = localStorage.getItem('theme') || 'dark';
    
    function initTheme() {
      setTheme(currentTheme);
    }
    
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(currentTheme);
    }
    
    function setTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('theme', theme);
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');
      
      html.classList.remove('light', 'dark');
      html.classList.add(theme);
      
      if (theme === 'dark') {
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
      } else {
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
      }
    }
    
    initTheme();

    // و ڈç›®ç®،çگ†هٹںèƒ½
    let sections = [];

    async function loadSections() {
      try {
        const response = await fetch('/api/data/sections', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (response.ok) {
          sections = await response.json();
          renderSections();
        }
      } catch (error) {
        console.error('Load sections failed:', error);
      }
    }

    function renderSections() {
      const container = document.getElementById('sectionsContainer');
      if (sections.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-gray-500 dark:text-gray-400 col-span-full">
            <svg class="w-16 h-16 mx-auto mb-4 text-gray-400 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
            </svg>
            <p>وڑ‚و— و ڈç›®ï¼Œç‚¹ه‡»هڈ³ن¸ٹè§’و–°ه»؛</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = sections.map(section => `
        <div class="section-card bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-xl p-5 transition-colors duration-200">
          <div class="flex items-start justify-between mb-3">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">${section.name || 'وœھه‘½هگچو ڈç›?}</h3>
            <span class="px-2 py-1 text-xs bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 rounded-lg">وژ’ه؛ڈï¼?{section.order || 0}</span>
          </div>
          <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${section.desc || 'وڑ‚و— وڈڈè؟°'}</p>
          <div class="flex gap-2">
            <button onclick="editSection('${section.id}')" class="flex-1 px-3 py-2 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors text-sm font-medium text-gray-700 dark:text-gray-300">ç¼–è¾‘</button>
            <button onclick="deleteSection('${section.id}')" class="flex-1 px-3 py-2 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-lg transition-colors text-sm font-medium text-red-600 dark:text-red-400">هˆ é™¤</button>
          </div>
        </div>
      `).join('');
    }

    function openCreateModal() {
      document.getElementById('modalTitle').textContent = 'و–°ه»؛و ڈç›®';
      document.getElementById('sectionForm').reset();
      document.getElementById('sectionId').value = '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function editSection(id) {
      const section = sections.find(s => s.id === id);
      if (section) {
        document.getElementById('modalTitle').textContent = 'ç¼–è¾‘و ڈç›®';
        document.getElementById('sectionId').value = section.id;
        document.getElementById('sectionName').value = section.name || '';
        document.getElementById('sectionDesc').value = section.desc || '';
        document.getElementById('sectionOrder').value = section.order || 0;
        document.getElementById('modal').classList.remove('hidden');
      }
    }

    async function saveSection() {
      const id = document.getElementById('sectionId').value;
      const data = {
        name: document.getElementById('sectionName').value,
        desc: document.getElementById('sectionDesc').value,
        order: parseInt(document.getElementById('sectionOrder').value) || 0
      };

      try {
        const response = await fetch('/api/data/sections' + (id ? `/${id}` : ''), {
          method: id ? 'PUT' : 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          closeModal();
          await loadSections();
        }
      } catch (error) {
        console.error('Save section failed:', error);
      }
    }

    async function deleteSection(id) {
      if (!confirm('ç،®ه®ڑè¦پهˆ é™¤è؟™ن¸ھو ڈç›®هگ—ï¼?)) return;

      try {
        const response = await fetch(`/api/data/sections/${id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });

        if (response.ok) {
          await loadSections();
        }
      } catch (error) {
        console.error('Delete section failed:', error);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/admin';
    }

    // هˆ‌ه§‹هŒ?    loadSections();
  </script>
