  <script>
    // ========== СИ╗жбўтѕЄТЇб ==========
    let currentTheme = localStorage.getItem('theme') || 'dark';
    
    function initTheme() {
      setTheme(currentTheme);
    }
    
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(currentTheme);
    }
    
    function setTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('theme', theme);
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');
      
      html.classList.remove('light', 'dark');
      html.classList.add(theme);
      
      if (theme === 'dark') {
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
      } else {
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
      }
    }
    
    // тѕЮтДІтїќСИ╗жб?    initTheme();

    // тіаУййУ«Йуй«
    async function loadSettings() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch('/api/settings', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          const data = await response.json();
          const settings = data.settings || {};
          document.getElementById('blogName').value = settings.blogName || 'DevLog';
          document.getElementById('blogDesc').value = settings.blogDesc || 'У«░тйЋТіђТю»СИјућЪТ┤╗';
          document.getElementById('metaKeywords').value = settings.metaKeywords || '';
          document.getElementById('metaDescription').value = settings.metaDescription || '';
          document.getElementById('allowComments').checked = settings.allowComments !== false;
          document.getElementById('postsPerPage').value = settings.postsPerPage || 10;
        }
      } catch (error) {
        console.error('тіаУййУ«Йуй«тц▒У┤Ц:', error);
      }
    }

    // С┐ЮтГўУ«Йуй«
    async function saveSettings() {
      const settings = {
        blogName: document.getElementById('blogName').value.trim(),
        blogDesc: document.getElementById('blogDesc').value.trim(),
        metaKeywords: document.getElementById('metaKeywords').value.trim(),
        metaDescription: document.getElementById('metaDescription').value.trim(),
        allowComments: document.getElementById('allowComments').checked,
        postsPerPage: parseInt(document.getElementById('postsPerPage').value)
      };

      if (!settings.blogName) {
        alert('У»иУЙЊтЁЦтЇџт«бтљЇуД?);
        return;
      }

      try {
        const token = localStorage.getItem('token');
        const response = await fetch('/api/settings', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(settings)
        });
        
        if (response.ok) {
          alert('У«Йуй«ти▓С┐ЮтГў№╝Ђ');
        } else {
          alert('С┐ЮтГўтц▒У┤Ц');
        }
      } catch (error) {
        console.error('С┐ЮтГўУ«Йуй«тц▒У┤Ц:', error);
        alert('У«Йуй«ти▓Тюгтю░С┐ЮтГў№╝ѕТ╝ћуц║ТеАт╝Ј№╝?);
      }
    }

    // т»╝УѕфтЄйТЋ░

    function goToDashboard() { window.location.href = '/admin/dashboard'; }
    function goToPosts() { window.location.href = '/admin/posts'; }

    function goToSections() { window.location.href = '/admin/sections'; }
    function goToTags() { window.location.href = '/admin/tags'; }
    function logout() { localStorage.removeItem('token'); window.location.href = '/admin'; }

    // тѕЮтДІтї?    loadSettings();
  </script>
