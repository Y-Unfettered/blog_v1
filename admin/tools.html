<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools Management - DevLog Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            dark: {
              bg: '#0a0a0a',
              surface: '#111111',
              border: '#1f1f1f',
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/admin/admin-common.css">
  <style>
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-overlay[open] {
      display: flex;
    }
    .modal-overlay::backdrop {
      background: rgba(0, 0, 0, 0.75);
    }
    .modal-content {
      background: white;
      border-radius: 0.75rem;
      padding: 1.5rem;
      max-width: 32rem;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .dark .modal-content {
      background: #1a1a1a;
    }
    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #111;
    }
    .dark .modal-title {
      color: #fff;
    }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 0.5rem;
    }
    .input-control {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background: #ffffff;
      color: #111827;
      font-size: 0.875rem;
    }
    .dark .input-control {
      border-color: #374151;
      background: #1f2937;
      color: #fff;
    }
    .input-control:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    .btn-primary {
      background: #6366f1;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    .btn-secondary {
      background: #374151;
      color: #9ca3af;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      border: 1px solid #4b5563;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover {
      background: #4b5563;
    }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#0a0a0a] dark:text-gray-100">
  <div id="admin-app"></div>

  <script src="/admin/admin-common.js"></script>
  <script>
    if (!window.AdminApp || !AdminApp.requireAuth()) {
      throw new Error('Missing admin auth context.');
    }

    const locale = AdminApp.getLocale();
    const t = AdminApp.translate;

    const TEXT = {
      activeLabel: { en: 'Tools Management', zh: '工具管理' },
      title: { en: 'Tools Management', zh: '工具管理' },
      description: {
        en: 'Manage the tools and resources displayed on the Tools page. Add, edit, or delete tools to help visitors discover useful resources.',
        zh: '管理工具分享页面展示的工具和资源。添加、编辑或删除工具，帮助访客发现有价值的资源。',
      },
      newTool: { en: 'New Tool', zh: '新建工具' },
      id: { en: 'ID', zh: 'ID' },
      name: { en: 'Name', zh: '名称' },
      category: { en: 'Category', zh: '分类' },
      type: { en: 'Type', zh: '类型' },
      description: { en: 'Description', zh: '描述' },
      url: { en: 'URL', zh: '链接' },
      icon: { en: 'Icon', zh: '图标' },
      color: { en: 'Color', zh: '颜色' },
      enabled: { en: 'Enabled', zh: '启用' },
      updatedAt: { en: 'Updated', zh: '更新时间' },
      actions: { en: 'Actions', zh: '操作' },
      edit: { en: 'Edit', zh: '编辑' },
      delete: { en: 'Delete', zh: '删除' },
      save: { en: 'Save', zh: '保存' },
      cancel: { en: 'Cancel', zh: '取消' },
      confirmDelete: { en: 'Are you sure you want to delete this tool?', zh: '确定要删除此工具吗？' },
      searchPlaceholder: { en: 'Search tools...', zh: '搜索工具...' },
      filterByCategory: { en: 'All Categories', zh: '全部分类' },
      noTools: { en: 'No tools found. Click "New Tool" to add one.', zh: '暂无工具，点击"新建工具"添加。' },
      loading: { en: 'Loading tools...', zh: '正在加载工具...' },
      saveSuccess: { en: 'Saved successfully', zh: '保存成功' },
      saveFailed: { en: 'Save failed', zh: '保存失败' },
      deleteSuccess: { en: 'Deleted successfully', zh: '删除成功' },
      deleteFailed: { en: 'Delete failed', zh: '删除失败' },
      categories: {
        '效率工具': { en: 'Efficiency Tools', zh: '效率工具' },
        '工作流': { en: 'Workflow', zh: '工作流' },
        '参考资源': { en: 'Reference', zh: '参考资源' },
        '素材资源': { en: 'Assets', zh: '素材资源' },
      },
      types: {
        '自制工具': { en: 'Custom Tool', zh: '自制工具' },
        '参考资源': { en: 'Reference', zh: '参考资源' },
        '素材资源': { en: 'Assets', zh: '素材资源' },
        '工作流': { en: 'Workflow', zh: '工作流' },
        '效率工具': { en: 'Efficiency Tools', zh: '效率工具' },
      },
    };

    const API_TOOLS = '/api/data/tools';

    const layout = AdminApp.mountPage({
      active: 'tools',
      activeLabel: TEXT.activeLabel,
      title: TEXT.title,
      description: TEXT.description,
      actions: [
        {
          id: 'new-tool-btn',
          label: TEXT.newTool,
          onClick: () => openToolModal(),
          className: 'rounded-xl bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-lg shadow-indigo-500/20 transition-colors hover:bg-indigo-700',
        },
      ],
    });

    let allTools = [];
    let filteredTools = [];
    let currentFilter = { search: '', category: '' };

    const CATEGORIES = ['效率工具', '工作流', '参考资源', '素材资源'];
    const TYPES = ['自制工具', '参考资源', '素材资源', '工作流', '效率工具'];
    const ICONS = [
      'code-2', 'wrench', 'swatch-book', 'images',
      'file-text', 'git-branch', 'clipboard-check', 'palette',
      'rocket', 'terminal', 'folder-plus', 'check-square',
      'zap', 'book-open', 'workflow', 'layers',
    ];

    layout.content.innerHTML = `
      <div class="admin-panel">
        <div class="mb-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div class="flex flex-1 items-center gap-3">
            <input
              id="search-input"
              type="text"
              placeholder="${t(TEXT.searchPlaceholder)}"
              class="input-control flex-1"
            />
            <select id="category-filter" class="input-control w-40">
              <option value="">${t(TEXT.filterByCategory)}</option>
              ${CATEGORIES.map(cat => `<option value="${cat}">${t(TEXT.categories[cat]?.zh || cat)}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full">
            <thead>
              <tr class="border-b border-gray-200 dark:border-gray-700">
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.name)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.category)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.type)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold hidden lg:table-cell">${t(TEXT.url)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold hidden md:table-cell">${t(TEXT.updatedAt)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.actions)}</th>
              </tr>
            </thead>
            <tbody id="tools-table-body"></tbody>
          </table>
        </div>

        <div id="empty-state" class="hidden py-12 text-center text-gray-500">
          ${t(TEXT.noTools)}
        </div>
      </div>

      <dialog id="tool-modal" class="modal-overlay" hidden>
        <div class="modal-content max-w-2xl">
          <h3 id="modal-title" class="modal-title">${t(TEXT.newTool)}</h3>
          <form id="tool-form" class="space-y-4">
            <input type="hidden" name="id" id="tool-id" />
            <div class="grid gap-4 md:grid-cols-2">
              <div>
                <label class="form-label">${t(TEXT.name)}</label>
                <input name="name" id="tool-name" type="text" class="input-control" required maxlength="100" />
              </div>
              <div>
                <label class="form-label">${t(TEXT.category)}</label>
                <select name="category" id="tool-category" class="input-control" required>
                  ${CATEGORIES.map(cat => `<option value="${cat}">${t(TEXT.categories[cat]?.zh || cat)}</option>`).join('')}
                </select>
              </div>
            </div>
            <div class="grid gap-4 md:grid-cols-2">
              <div>
                <label class="form-label">${t(TEXT.type)}</label>
                <select name="type" id="tool-type" class="input-control" required>
                  ${TYPES.map(type => `<option value="${type}">${t(TEXT.types[type]?.zh || type)}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="form-label">${t(TEXT.icon)}</label>
                <select name="icon" id="tool-icon" class="input-control">
                  ${ICONS.map(icon => `<option value="${icon}">${icon}</option>`).join('')}
                </select>
              </div>
            </div>
            <div>
              <label class="form-label">${t(TEXT.description)}</label>
              <textarea name="description" id="tool-description" class="input-control" rows="3" maxlength="500" required></textarea>
            </div>
            <div class="grid gap-4 md:grid-cols-2">
              <div>
                <label class="form-label">${t(TEXT.url)}</label>
                <input name="url" id="tool-url" type="url" class="input-control" placeholder="https://..." />
              </div>
              <div>
                <label class="form-label">${t(TEXT.color)}</label>
                <input name="color" id="tool-color" type="color" class="input-control h-10 w-full" value="#6366f1" />
              </div>
            </div>
            <div class="flex items-center gap-2">
              <input name="enabled" id="tool-enabled" type="checkbox" class="h-4 w-4" checked />
              <label for="tool-enabled" class="text-sm">${t(TEXT.enabled)}</label>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn-secondary" onclick="closeToolModal()">${t(TEXT.cancel)}</button>
              <button type="submit" class="btn-primary">${t(TEXT.save)}</button>
            </div>
          </form>
        </div>
      </dialog>
    `;

    const modal = document.getElementById('tool-modal');
    const form = document.getElementById('tool-form');
    const searchInput = document.getElementById('search-input');
    const categoryFilter = document.getElementById('category-filter');

    function openToolModal(tool = null) {
      document.getElementById('modal-title').textContent = tool ? `${t(TEXT.edit)} - ${tool.name}` : t(TEXT.newTool);
      document.getElementById('tool-id').value = tool?.id || '';
      document.getElementById('tool-name').value = tool?.name || '';
      document.getElementById('tool-category').value = tool?.category || CATEGORIES[0];
      document.getElementById('tool-type').value = tool?.type || TYPES[0];
      document.getElementById('tool-icon').value = tool?.icon || ICONS[0];
      document.getElementById('tool-description').value = tool?.description || '';
      document.getElementById('tool-url').value = tool?.url || '';
      document.getElementById('tool-color').value = tool?.color || '#6366f1';
      document.getElementById('tool-enabled').checked = tool?.enabled !== false;
      modal.showModal();
    }

    function closeToolModal() {
      modal.close();
    }

    async function loadTools() {
      layout.content.querySelector('#tools-table-body').innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center">${t(TEXT.loading)}</td></tr>`;
      try {
        const token = AdminApp.getToken();
        const res = await fetch(API_TOOLS, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
        });
        if (!res.ok) throw new Error('Failed to load');
        allTools = await res.json();
        applyFilters();
      } catch (err) {
        console.error('Load tools error:', err);
        layout.content.querySelector('#tools-table-body').innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-red-500">加载失败：${err.message}</td></tr>`;
      }
    }

    function applyFilters() {
      filteredTools = allTools.filter(tool => {
        const matchSearch = !currentFilter.search ||
          tool.name.toLowerCase().includes(currentFilter.search.toLowerCase()) ||
          tool.description.toLowerCase().includes(currentFilter.search.toLowerCase());
        const matchCategory = !currentFilter.category || tool.category === currentFilter.category;
        return matchSearch && matchCategory;
      });
      renderTable();
    }

    function renderTable() {
      const tbody = layout.content.querySelector('#tools-table-body');
      const empty = layout.content.querySelector('#empty-state');

      if (filteredTools.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      tbody.innerHTML = filteredTools.map(tool => `
        <tr class="group border-b border-gray-100 transition-colors hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-gray-800/50">
          <td class="px-4 py-3">
            <div class="flex items-center gap-3">
              <div class="flex h-10 w-10 items-center justify-center rounded-lg" style="background-color: ${hexToRgba(tool.color || '#6366f1', 0.15)}">
                <span class="text-lg" style="color: ${tool.color || '#6366f1'}">
                  <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                  </svg>
                </span>
              </div>
              <div>
                <div class="font-medium">${escapeHtml(tool.name)}</div>
                <div class="text-xs text-gray-500">${escapeHtml(tool.description?.slice(0, 50) || '')}...</div>
              </div>
            </div>
          </td>
          <td class="px-4 py-3 text-sm">${t(TEXT.categories[tool.category]?.zh || tool.category)}</td>
          <td class="px-4 py-3 text-sm">${t(TEXT.types[tool.type]?.zh || tool.type)}</td>
          <td class="px-4 py-3 text-sm hidden lg:table-cell">
            ${tool.url ? `<a href="${escapeHtml(tool.url)}" target="_blank" class="text-indigo-500 hover:underline">${escapeHtml(tool.url)}</a>` : '<span class="text-gray-500">-</span>'}
          </td>
          <td class="px-4 py-3 text-sm text-gray-500 hidden md:table-cell">${tool.updatedAt || '-'}</td>
          <td class="px-4 py-3">
            <div class="flex gap-2">
              <button class="text-indigo-500 hover:text-indigo-600" onclick="editTool('${tool.id}')">${t(TEXT.edit)}</button>
              <button class="text-red-500 hover:text-red-600" onclick="deleteTool('${tool.id}')">${t(TEXT.delete)}</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function hexToRgba(hex, alpha) {
      const clean = hex.replace('#', '');
      if (clean.length !== 6) return `rgba(99, 102, 241, ${alpha})`;
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    async function saveTool(formData) {
      const tool = {
        id: formData.get('id') || String(Date.now()),
        name: formData.get('name'),
        category: formData.get('category'),
        type: formData.get('type'),
        icon: formData.get('icon'),
        description: formData.get('description'),
        url: formData.get('url') || '',
        color: formData.get('color'),
        enabled: formData.get('enabled') === 'on',
        updatedAt: new Date().toISOString().slice(0, 10),
      };

      const index = allTools.findIndex(t => t.id === tool.id);
      if (index >= 0) {
        allTools[index] = tool;
      } else {
        allTools.push(tool);
      }

      try {
        const token = AdminApp.getToken();
        const res = await fetch(API_TOOLS, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify(allTools),
        });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.message || 'Save failed');
        }
        alert(t(TEXT.saveSuccess));
        closeToolModal();
        loadTools();
      } catch (err) {
        console.error('Save error:', err);
        alert(t(TEXT.saveFailed) + ': ' + err.message);
      }
    }

    async function deleteTool(id) {
      if (!confirm(t(TEXT.confirmDelete))) return;
      try {
        allTools = allTools.filter(t => t.id !== id);
        const token = AdminApp.getToken();
        const res = await fetch(API_TOOLS, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify(allTools),
        });
        if (!res.ok) throw new Error('Delete failed');
        alert(t(TEXT.deleteSuccess));
        loadTools();
      } catch (err) {
        alert(t(TEXT.deleteFailed) + ': ' + err.message);
      }
    }

    window.editTool = (id) => {
      const tool = allTools.find(t => t.id === id);
      if (tool) openToolModal(tool);
    };

    window.deleteTool = deleteTool;

    searchInput.addEventListener('input', (e) => {
      currentFilter.search = e.target.value;
      applyFilters();
    });

    categoryFilter.addEventListener('change', (e) => {
      currentFilter.category = e.target.value;
      applyFilters();
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      saveTool(formData);
    });

    loadTools();
  </script>
</body>
</html>
