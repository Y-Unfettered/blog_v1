<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevLog Overview Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            dark: {
              bg: '#0a0a0a',
              surface: '#111111',
              border: '#1f1f1f',
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/admin/admin-common.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#0a0a0a] dark:text-gray-100">
  <div id="admin-app"></div>

  <script src="/admin/admin-common.js"></script>
  <script>
    if (!window.AdminApp || !AdminApp.requireAuth()) {
      throw new Error('Missing admin auth context.');
    }

    const locale = AdminApp.getLocale();
    const t = function translateText(value) {
      return AdminApp.translate(value, locale);
    };

    const TEXT = {
      activeLabel: { en: 'Overview', zh: '概览' },
      title: { en: 'Dashboard', zh: '仪表盘' },
      description: {
        en: 'Review content volume, recent updates, category distribution, and current admin runtime information.',
        zh: '查看内容规模、最近更新、分类分布以及当前后台运行状态。',
      },
      newPost: { en: 'New Post', zh: '新建文章' },
      openSite: { en: 'Open Site', zh: '查看前台' },
      posts: { en: 'Posts', zh: '文章' },
      contentStructure: { en: 'Content Structure', zh: '内容结构' },
      navigation: { en: 'Navigation', zh: '导航' },
      pinnedPosts: { en: 'Pinned Posts', zh: '置顶文章' },
      published: { en: 'Published', zh: '已发布' },
      drafts: { en: 'Drafts', zh: '草稿' },
      categories: { en: 'Categories', zh: '分类' },
      tags: { en: 'Tags', zh: '标签' },
      visibleTotal: { en: 'Visible / Total', zh: '显示 / 总数' },
      generatedAt: { en: 'Generated at', zh: '生成时间' },
      recentPosts: { en: 'Recent Posts', zh: '最近文章' },
      latestUpdates: { en: 'Latest Updates', zh: '最近更新' },
      openPosts: { en: 'Open Posts', zh: '进入文章管理' },
      system: { en: 'System', zh: '系统' },
      runtime: { en: 'Runtime', zh: '运行状态' },
      nodeVersion: { en: 'Node Version', zh: 'Node 版本' },
      uptime: { en: 'Uptime', zh: '运行时长' },
      dataDirectory: { en: 'Data Directory', zh: '数据目录' },
      rssMemory: { en: 'RSS Memory', zh: 'RSS 内存' },
      heapUsed: { en: 'Heap Used', zh: 'Heap 使用' },
      weeklyActivity: { en: 'Weekly Activity', zh: '周活跃度' },
      last7Days: { en: 'Last 7 Days', zh: '最近 7 天' },
      activityDescription: {
        en: 'Counted from post create and update timestamps.',
        zh: '按文章创建和更新时间进行统计。',
      },
      topCategories: { en: 'Top Categories', zh: '高频分类' },
      categoryDistribution: { en: 'Category Distribution', zh: '分类分布' },
      currentSiteProfile: { en: 'Current Site Profile', zh: '当前站点信息' },
      markdownTheme: { en: 'Markdown Theme', zh: 'Markdown 主题' },
      noRecentPosts: { en: 'No recent posts available.', zh: '暂无最近文章。' },
      noCategory: { en: 'No category', zh: '未分类' },
      pinned: { en: 'Pinned', zh: '置顶' },
      draft: { en: 'Draft', zh: '草稿' },
      updated: { en: 'Updated', zh: '更新于' },
      noActivityData: { en: 'No activity data available.', zh: '暂无活动数据。' },
      noCategoryStats: { en: 'No category stats available.', zh: '暂无分类统计。' },
      unnamedCategory: { en: 'Unnamed category', zh: '未命名分类' },
      postsCount: { en: 'Posts', zh: '文章数' },
      siteNameFallback: { en: 'Site name not configured', zh: '未配置站点名称' },
      authorFallback: { en: 'Author not configured', zh: '未配置作者信息' },
      loading: { en: 'Loading dashboard data...', zh: '正在加载仪表盘数据...' },
      loadedPrefix: { en: 'Dashboard synchronized at ', zh: '仪表盘已同步，更新时间：' },
      loadFailedPrefix: { en: 'Failed to load dashboard: ', zh: '加载仪表盘失败：' },
    };

    const layout = AdminApp.mountPage({
      active: 'dashboard',
      activeLabel: { en: 'Overview Panel', zh: '概览面板' },
      title: { en: 'Overview Panel', zh: '概览面板' },
      description: TEXT.description,
      actions: [
        {
          id: 'create-post-btn',
          label: TEXT.newPost,
          href: '/admin/editor',
          className: 'rounded-xl bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-lg shadow-indigo-500/20 transition-colors hover:bg-indigo-700',
        },
        {
          id: 'open-site-btn',
          label: TEXT.openSite,
          href: '/',
          external: true,
          className: 'rounded-xl border border-gray-200 px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-800',
        },
        {
          id: 'update-code-btn',
          label: { en: 'Update Code', zh: '更新代码' },
          className: 'rounded-xl bg-rose-600 px-4 py-2 text-sm font-medium text-white shadow-lg shadow-rose-500/20 transition-colors hover:bg-rose-700',
        },
      ],
    });

    layout.content.innerHTML = `
      <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
        <article class="admin-panel metric-card p-5">
          <div class="flex items-center justify-between gap-4">
            <div>
              <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.posts)}</div>
              <div id="metric-total-posts" class="mt-2 text-3xl font-bold text-gray-900 dark:text-white">--</div>
            </div>
            <div class="rounded-2xl bg-indigo-50 px-3 py-2 text-xs font-semibold uppercase tracking-[0.12em] text-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-300">POSTS</div>
          </div>
          <div class="mt-4 text-sm text-gray-500 dark:text-gray-400">
            ${t(TEXT.published)} <span id="metric-published-posts" class="font-semibold text-gray-900 dark:text-white">--</span>
            / ${t(TEXT.drafts)} <span id="metric-draft-posts" class="font-semibold text-gray-900 dark:text-white">--</span>
          </div>
        </article>

        <article class="admin-panel metric-card p-5">
          <div class="flex items-center justify-between gap-4">
            <div>
              <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.contentStructure)}</div>
              <div id="metric-sections" class="mt-2 text-3xl font-bold text-gray-900 dark:text-white">--</div>
            </div>
            <div class="rounded-2xl bg-emerald-50 px-3 py-2 text-xs font-semibold uppercase tracking-[0.12em] text-emerald-600 dark:bg-emerald-500/10 dark:text-emerald-300">TREE</div>
          </div>
          <div class="mt-4 text-sm text-gray-500 dark:text-gray-400">
            ${t(TEXT.categories)} <span id="metric-categories" class="font-semibold text-gray-900 dark:text-white">--</span>
            / ${t(TEXT.tags)} <span id="metric-tags" class="font-semibold text-gray-900 dark:text-white">--</span>
          </div>
        </article>

        <article class="admin-panel metric-card p-5">
          <div class="flex items-center justify-between gap-4">
            <div>
              <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.navigation)}</div>
              <div id="metric-nav-visible" class="mt-2 text-3xl font-bold text-gray-900 dark:text-white">--</div>
            </div>
            <div class="rounded-2xl bg-amber-50 px-3 py-2 text-xs font-semibold uppercase tracking-[0.12em] text-amber-600 dark:bg-amber-500/10 dark:text-amber-300">NAV</div>
          </div>
          <div class="mt-4 text-sm text-gray-500 dark:text-gray-400">
            ${t(TEXT.visibleTotal)} <span id="metric-nav-total" class="font-semibold text-gray-900 dark:text-white">--</span>
          </div>
        </article>

        <article class="admin-panel metric-card p-5">
          <div class="flex items-center justify-between gap-4">
            <div>
              <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.pinnedPosts)}</div>
              <div id="metric-pinned-posts" class="mt-2 text-3xl font-bold text-gray-900 dark:text-white">--</div>
            </div>
            <div class="rounded-2xl bg-rose-50 px-3 py-2 text-xs font-semibold uppercase tracking-[0.12em] text-rose-600 dark:bg-rose-500/10 dark:text-rose-300">PIN</div>
          </div>
          <div class="mt-4 text-sm text-gray-500 dark:text-gray-400">
            ${t(TEXT.generatedAt)} <span id="dashboard-generated-at" class="font-semibold text-gray-900 dark:text-white">--</span>
          </div>
        </article>
      </section>

      <section class="mt-6 grid gap-6 xl:grid-cols-[minmax(0,1.5fr)_minmax(320px,0.9fr)]">
        <article class="admin-panel p-6">
          <div class="flex items-center justify-between gap-4">
            <div>
              <div class="admin-kicker text-gray-500 dark:text-gray-400">${t(TEXT.recentPosts)}</div>
              <h2 class="mt-1 text-lg font-semibold text-gray-900 dark:text-white">${t(TEXT.latestUpdates)}</h2>
            </div>
            <a href="/admin/posts" class="text-sm font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-300 dark:hover:text-indigo-200">${t(TEXT.openPosts)}</a>
          </div>
          <div id="recent-posts-list" class="mt-5 space-y-3"></div>
        </article>

        <article class="admin-panel p-6">
          <div class="admin-kicker text-gray-500 dark:text-gray-400">${t(TEXT.system)}</div>
          <h2 class="mt-1 text-lg font-semibold text-gray-900 dark:text-white">${t(TEXT.runtime)}</h2>
          <div class="mt-5 space-y-4">
            <div class="rounded-2xl bg-gray-50 px-4 py-3 dark:bg-gray-800/70">
              <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.nodeVersion)}</div>
              <div id="system-node-version" class="mt-1 text-base font-semibold text-gray-900 dark:text-white">--</div>
            </div>
            <div class="rounded-2xl bg-gray-50 px-4 py-3 dark:bg-gray-800/70">
              <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.uptime)}</div>
              <div id="system-uptime" class="mt-1 text-base font-semibold text-gray-900 dark:text-white">--</div>
            </div>
            <div class="rounded-2xl bg-gray-50 px-4 py-3 dark:bg-gray-800/70">
              <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.dataDirectory)}</div>
              <div id="system-data-dir" class="mt-1 break-all text-sm font-semibold text-gray-900 dark:text-white">--</div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="rounded-2xl bg-gray-50 px-4 py-3 dark:bg-gray-800/70">
                <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.rssMemory)}</div>
                <div id="system-rss" class="mt-1 text-base font-semibold text-gray-900 dark:text-white">--</div>
              </div>
              <div class="rounded-2xl bg-gray-50 px-4 py-3 dark:bg-gray-800/70">
                <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.heapUsed)}</div>
                <div id="system-heap" class="mt-1 text-base font-semibold text-gray-900 dark:text-white">--</div>
              </div>
            </div>
          </div>
        </article>
      </section>

      <section class="mt-6 grid gap-6 xl:grid-cols-[minmax(0,1.2fr)_minmax(320px,0.8fr)]">
        <article class="admin-panel p-6">
          <div class="flex items-center justify-between gap-4">
            <div>
              <div class="admin-kicker text-gray-500 dark:text-gray-400">${t(TEXT.weeklyActivity)}</div>
              <h2 class="mt-1 text-lg font-semibold text-gray-900 dark:text-white">${t(TEXT.last7Days)}</h2>
            </div>
            <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.activityDescription)}</div>
          </div>
          <div id="weekly-activity" class="mt-6 flex h-56 items-end gap-3"></div>
        </article>

        <article class="admin-panel p-6">
          <div class="admin-kicker text-gray-500 dark:text-gray-400">${t(TEXT.topCategories)}</div>
          <h2 class="mt-1 text-lg font-semibold text-gray-900 dark:text-white">${t(TEXT.categoryDistribution)}</h2>
          <div id="top-categories-list" class="mt-5 space-y-3"></div>
          <div class="mt-6 rounded-2xl bg-gray-50 px-4 py-4 dark:bg-gray-800/70">
            <div class="text-sm text-gray-500 dark:text-gray-400">${t(TEXT.currentSiteProfile)}</div>
            <div id="site-name" class="mt-2 text-base font-semibold text-gray-900 dark:text-white">--</div>
            <div id="site-author" class="mt-1 text-sm text-gray-500 dark:text-gray-400">--</div>
            <div class="mt-3 text-sm text-gray-500 dark:text-gray-400">${t(TEXT.markdownTheme)}: <span id="site-markdown-theme" class="font-semibold text-gray-900 dark:text-white">--</span></div>
          </div>
        </article>
      </section>
    `;

    function renderMetrics(stats, generatedAt) {
      document.getElementById('metric-total-posts').textContent = stats.totalPosts;
      document.getElementById('metric-published-posts').textContent = stats.publishedPosts;
      document.getElementById('metric-draft-posts').textContent = stats.draftPosts;
      document.getElementById('metric-sections').textContent = stats.totalSections;
      document.getElementById('metric-categories').textContent = stats.totalCategories;
      document.getElementById('metric-tags').textContent = stats.totalTags;
      document.getElementById('metric-nav-visible').textContent = stats.visibleNavItems;
      document.getElementById('metric-nav-total').textContent = stats.visibleNavItems + ' / ' + stats.totalNavItems;
      document.getElementById('metric-pinned-posts').textContent = stats.pinnedPosts;
      document.getElementById('dashboard-generated-at').textContent = AdminApp.formatDateTime(generatedAt);
    }

    function renderRecentPosts(posts) {
      const container = document.getElementById('recent-posts-list');
      if (!posts.length) {
        container.innerHTML = '<div class="rounded-2xl bg-gray-50 px-4 py-5 text-sm text-gray-500 dark:bg-gray-800/70 dark:text-gray-400">' + AdminApp.escapeHtml(t(TEXT.noRecentPosts)) + '</div>';
        return;
      }

      container.innerHTML = posts.map(function renderPost(post) {
        const statusClass = post.status === 'published' ? 'status-published' : 'status-draft';
        const statusText = post.status === 'published' ? t(TEXT.published) : t(TEXT.draft);
        const pinnedText = post.pinned ? '<span class="pill bg-indigo-500/10 text-indigo-600 dark:text-indigo-300">' + AdminApp.escapeHtml(t(TEXT.pinned)) + '</span>' : '';
        const categories = post.categories.length ? post.categories.join(' / ') : t(TEXT.noCategory);
        return `
          <a href="/admin/editor?id=${encodeURIComponent(post.id)}" class="block rounded-2xl border border-gray-200 px-4 py-4 transition-colors hover:border-indigo-300 hover:bg-indigo-50/40 dark:border-gray-800 dark:hover:border-indigo-500/40 dark:hover:bg-indigo-500/5">
            <div class="flex flex-wrap items-start justify-between gap-3">
              <div>
                <div class="text-base font-semibold text-gray-900 dark:text-white">${AdminApp.escapeHtml(post.title)}</div>
                <div class="mt-1 text-sm text-gray-500 dark:text-gray-400">${AdminApp.escapeHtml(categories)}</div>
              </div>
              <div class="flex items-center gap-2">
                ${pinnedText}
                <span class="pill ${statusClass}">${AdminApp.escapeHtml(statusText)}</span>
              </div>
            </div>
            <div class="mt-3 text-xs text-gray-500 dark:text-gray-400">${AdminApp.escapeHtml(t(TEXT.updated))}: ${AdminApp.formatDateTime(post.updatedAt)}</div>
          </a>
        `;
      }).join('');
    }

    function renderWeeklyActivity(items) {
      const container = document.getElementById('weekly-activity');
      if (!items.length) {
        container.innerHTML = '<div class="text-sm text-gray-500 dark:text-gray-400">' + AdminApp.escapeHtml(t(TEXT.noActivityData)) + '</div>';
        return;
      }

      const maxCount = Math.max.apply(null, items.map(function pickCount(item) { return item.count; }).concat([1]));
      container.innerHTML = items.map(function renderItem(item) {
        const height = Math.max(12, Math.round((item.count / maxCount) * 180));
        const label = item.date.slice(5).replace('-', '/');
        return `
          <div class="flex flex-1 flex-col items-center gap-3">
            <div class="w-full rounded-t-2xl bg-gradient-to-t from-indigo-600 to-indigo-400" style="height: ${height}px"></div>
            <div class="text-sm font-semibold text-gray-900 dark:text-white">${item.count}</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">${label}</div>
          </div>
        `;
      }).join('');
    }

    function renderTopCategories(items) {
      const container = document.getElementById('top-categories-list');
      if (!items.length) {
        container.innerHTML = '<div class="rounded-2xl bg-gray-50 px-4 py-5 text-sm text-gray-500 dark:bg-gray-800/70 dark:text-gray-400">' + AdminApp.escapeHtml(t(TEXT.noCategoryStats)) + '</div>';
        return;
      }

      container.innerHTML = items.map(function renderCategory(item, index) {
        return `
          <div class="flex items-center justify-between rounded-2xl bg-gray-50 px-4 py-3 dark:bg-gray-800/70">
            <div class="flex items-center gap-3">
              <div class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-500/10 text-sm font-semibold text-indigo-600 dark:text-indigo-300">${index + 1}</div>
              <div>
                <div class="text-sm font-semibold text-gray-900 dark:text-white">${AdminApp.escapeHtml(item.name || t(TEXT.unnamedCategory))}</div>
                <div class="text-xs text-gray-500 dark:text-gray-400">${AdminApp.escapeHtml(t(TEXT.postsCount))}: ${item.count}</div>
              </div>
            </div>
            <div class="text-sm font-semibold text-gray-900 dark:text-white">${item.count}</div>
          </div>
        `;
      }).join('');
    }

    function renderSystem(system, site) {
      document.getElementById('system-node-version').textContent = system.nodeVersion || '--';
      document.getElementById('system-uptime').textContent = AdminApp.formatDuration(system.uptimeSeconds);
      document.getElementById('system-data-dir').textContent = system.dataDir || '--';
      document.getElementById('system-rss').textContent = (system.rssMb || 0) + ' MB';
      document.getElementById('system-heap').textContent = (system.heapUsedMb || 0) + ' MB';
      document.getElementById('site-name').textContent = site.siteName || t(TEXT.siteNameFallback);
      document.getElementById('site-author').textContent = site.author || t(TEXT.authorFallback);
      document.getElementById('site-markdown-theme').textContent = site.markdownTheme || 'default';
    }

    async function loadDashboard() {
      layout.setNotice(t(TEXT.loading), 'info');
      try {
        const payload = await AdminApp.requestJson('/api/data/dashboard');
        renderMetrics(payload.stats, payload.generatedAt);
        renderRecentPosts(payload.recentPosts || []);
        renderWeeklyActivity(payload.weeklyActivity || []);
        renderTopCategories(payload.topCategories || []);
        renderSystem(payload.system || {}, payload.site || {});
        layout.setNotice(t(TEXT.loadedPrefix) + AdminApp.formatDateTime(payload.generatedAt) + '.', 'success');
      } catch (error) {
        layout.setNotice(t(TEXT.loadFailedPrefix) + error.message, 'error');
      }
    }

    const unsubscribe = AdminApp.subscribeToDataChanges(function onDataChange() {
      loadDashboard();
    });

    window.addEventListener('beforeunload', function cleanup() {
      unsubscribe();
    });

    loadDashboard();

    // 代码更新功能
    document.getElementById('update-code-btn').addEventListener('click', async () => {
      if (!confirm('确定要更新代码吗？这将会拉取最新的代码并可能重启服务。')) {
        return;
      }

      try {
        layout.setNotice(t({ en: 'Updating code...', zh: '正在更新代码...' }), 'info');
        
        const response = await AdminApp.requestJson('/api/admin/update', {
          method: 'POST'
        });
        
        if (response.success) {
          layout.setNotice(t({ en: 'Code updated successfully! Please refresh the page to see changes.', zh: '代码更新成功！请刷新页面查看更改。' }), 'success');
        } else {
          layout.setNotice(t({ en: 'Code update failed: ', zh: '代码更新失败：' }) + (response.message || response.error), 'error');
        }
      } catch (error) {
        layout.setNotice(t({ en: 'Update failed: ', zh: '更新失败：' }) + error.message, 'error');
      }
    });
  </script>
</body>
</html>
