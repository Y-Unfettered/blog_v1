<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issues Management - DevLog Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            dark: {
              bg: '#0a0a0a',
              surface: '#111111',
              border: '#1f1f1f',
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/admin/admin-common.css">
  <style>
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-overlay[open] {
      display: flex;
    }
    .modal-overlay::backdrop {
      background: rgba(0, 0, 0, 0.75);
    }
    .modal-content {
      background: white;
      border-radius: 0.75rem;
      padding: 1.5rem;
      max-width: 48rem;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .dark .modal-content {
      background: #1a1a1a;
    }
    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #111;
    }
    .dark .modal-title {
      color: #fff;
    }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 0.5rem;
    }
    .input-control {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background: #ffffff;
      color: #111827;
      font-size: 0.875rem;
    }
    .dark .input-control {
      border-color: #374151;
      background: #1f2937;
      color: #fff;
    }
    .input-control:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    .btn-primary {
      background: #6366f1;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    .btn-secondary {
      background: #374151;
      color: #9ca3af;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      border: 1px solid #4b5563;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover {
      background: #4b5563;
    }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
    .status-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .priority-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .status-resolved {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
    }
    .status-observing {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
    }
    .status-pending {
      background: rgba(107, 114, 128, 0.1);
      color: #6b7280;
    }
    .priority-high {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    .priority-medium {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
    }
    .priority-low {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#0a0a0a] dark:text-gray-100">
  <div id="admin-app"></div>

  <script src="/admin/admin-common.js"></script>
  <script>
    if (!window.AdminApp || !AdminApp.requireAuth()) {
      throw new Error('Missing admin auth context.');
    }

    const locale = AdminApp.getLocale();
    const t = AdminApp.translate;

    const TEXT = {
      activeLabel: { en: 'Issues Management', zh: '问题管理' },
      title: { en: 'Issues Management', zh: '问题管理' },
      description: {
        en: 'Manage issue records, including their status, priority, categories, and detailed information.',
        zh: '管理问题记录，包括状态、优先级、分类和详细信息。',
      },
      newIssue: { en: 'New Issue', zh: '新建问题' },
      id: { en: 'ID', zh: 'ID' },
      title: { en: 'Title', zh: '标题' },
      status: { en: 'Status', zh: '状态' },
      priority: { en: 'Priority', zh: '优先级' },
      category: { en: 'Category', zh: '分类' },
      phenomenon: { en: 'Phenomenon', zh: '问题现象' },
      solution: { en: 'Solution', zh: '修复步骤' },
      conclusion: { en: 'Conclusion', zh: '结论' },
      tags: { en: 'Tags', zh: '标签' },
      createdAt: { en: 'Created', zh: '创建时间' },
      updatedAt: { en: 'Updated', zh: '更新时间' },
      actions: { en: 'Actions', zh: '操作' },
      edit: { en: 'Edit', zh: '编辑' },
      delete: { en: 'Delete', zh: '删除' },
      save: { en: 'Save', zh: '保存' },
      cancel: { en: 'Cancel', zh: '取消' },
      confirmDelete: { en: 'Are you sure you want to delete this issue?', zh: '确定要删除此问题吗？' },
      searchPlaceholder: { en: 'Search issues...', zh: '搜索问题...' },
      filterByStatus: { en: 'All Status', zh: '全部状态' },
      filterByPriority: { en: 'All Priority', zh: '全部优先级' },
      filterByCategory: { en: 'All Categories', zh: '全部分类' },
      noIssues: { en: 'No issues found. Click "New Issue" to add one.', zh: '暂无问题，点击"新建问题"添加。' },
      loading: { en: 'Loading issues...', zh: '正在加载问题...' },
      saveSuccess: { en: 'Saved successfully', zh: '保存成功' },
      saveFailed: { en: 'Save failed', zh: '保存失败' },
      deleteSuccess: { en: 'Deleted successfully', zh: '删除成功' },
      deleteFailed: { en: 'Delete failed', zh: '删除失败' },
      statuses: {
        resolved: { en: 'Resolved', zh: '已解决' },
        observing: { en: 'Observing', zh: '持续观察' },
        pending: { en: 'Pending', zh: '待处理' },
      },
      priorities: {
        high: { en: 'High', zh: '高优先级' },
        medium: { en: 'Medium', zh: '常规问题' },
        low: { en: 'Low', zh: '低优先级' },
      },
    };

    const API_ISSUES = '/api/data/issues';

    const layout = AdminApp.mountPage({
      active: 'issues',
      activeLabel: TEXT.activeLabel,
      title: TEXT.title,
      description: TEXT.description,
      actions: [
        {
          id: 'new-issue-btn',
          label: TEXT.newIssue,
          onClick: () => openIssueModal(),
          className: 'rounded-xl bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-lg shadow-indigo-500/20 transition-colors hover:bg-indigo-700',
        },
      ],
    });

    let allIssues = [];
    let filteredIssues = [];
    let currentFilter = { search: '', status: '', priority: '', category: '' };

    const STATUSES = ['resolved', 'observing', 'pending'];
    const PRIORITIES = ['high', 'medium', 'low'];

    layout.content.innerHTML = `
      <div class="admin-panel">
        <div class="mb-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div class="flex flex-1 flex-wrap items-center gap-3">
            <input
              id="search-input"
              type="text"
              placeholder="${t(TEXT.searchPlaceholder)}"
              class="input-control flex-1"
            />
            <select id="status-filter" class="input-control w-32">
              <option value="">${t(TEXT.filterByStatus)}</option>
              ${STATUSES.map(status => `<option value="${status}">${t(TEXT.statuses[status]?.zh || status)}</option>`).join('')}
            </select>
            <select id="priority-filter" class="input-control w-32">
              <option value="">${t(TEXT.filterByPriority)}</option>
              ${PRIORITIES.map(priority => `<option value="${priority}">${t(TEXT.priorities[priority]?.zh || priority)}</option>`).join('')}
            </select>
            <select id="category-filter" class="input-control w-40">
              <option value="">${t(TEXT.filterByCategory)}</option>
            </select>
          </div>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full">
            <thead>
              <tr class="border-b border-gray-200 dark:border-gray-700">
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.title)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.status)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.priority)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.category)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold hidden lg:table-cell">${t(TEXT.createdAt)}</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">${t(TEXT.actions)}</th>
              </tr>
            </thead>
            <tbody id="issues-table-body"></tbody>
          </table>
        </div>

        <div id="empty-state" class="hidden py-12 text-center text-gray-500">
          ${t(TEXT.noIssues)}
        </div>
      </div>

      <dialog id="issue-modal" class="modal-overlay" hidden>
        <div class="modal-content max-w-4xl">
          <h3 id="modal-title" class="modal-title">${t(TEXT.newIssue)}</h3>
          <form id="issue-form" class="space-y-4">
            <input type="hidden" name="id" id="issue-id" />
            <div class="grid gap-4 md:grid-cols-2">
              <div class="md:col-span-2">
                <label class="form-label">${t(TEXT.title)}</label>
                <input name="title" id="issue-title" type="text" class="input-control" required maxlength="200" />
              </div>
              <div>
                <label class="form-label">${t(TEXT.status)}</label>
                <select name="status" id="issue-status" class="input-control" required>
                  ${STATUSES.map(status => `<option value="${status}">${t(TEXT.statuses[status]?.zh || status)}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="form-label">${t(TEXT.priority)}</label>
                <select name="priority" id="issue-priority" class="input-control" required>
                  ${PRIORITIES.map(priority => `<option value="${priority}">${t(TEXT.priorities[priority]?.zh || priority)}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="form-label">${t(TEXT.category)}</label>
                <input name="category" id="issue-category" type="text" class="input-control" maxlength="50" />
              </div>
              <div>
                <label class="form-label">${t(TEXT.tags)}</label>
                <input name="tags" id="issue-tags" type="text" class="input-control" placeholder="标签1,标签2,标签3" maxlength="200" />
              </div>
            </div>
            <div>
              <label class="form-label">${t(TEXT.phenomenon)}</label>
              <textarea name="phenomenon" id="issue-phenomenon" class="input-control" rows="3" maxlength="1000" required></textarea>
            </div>
            <div>
              <label class="form-label">${t(TEXT.solution)}</label>
              <textarea name="solution" id="issue-solution" class="input-control" rows="4" maxlength="2000"></textarea>
            </div>
            <div>
              <label class="form-label">${t(TEXT.conclusion)}</label>
              <textarea name="conclusion" id="issue-conclusion" class="input-control" rows="2" maxlength="1000"></textarea>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn-secondary" onclick="closeIssueModal()">${t(TEXT.cancel)}</button>
              <button type="submit" class="btn-primary">${t(TEXT.save)}</button>
            </div>
          </form>
        </div>
      </dialog>
    `;

    const modal = document.getElementById('issue-modal');
    const form = document.getElementById('issue-form');
    const searchInput = document.getElementById('search-input');
    const statusFilter = document.getElementById('status-filter');
    const priorityFilter = document.getElementById('priority-filter');
    const categoryFilter = document.getElementById('category-filter');

    function openIssueModal(issue = null) {
      document.getElementById('modal-title').textContent = issue ? `${t(TEXT.edit)} - ${issue.title}` : t(TEXT.newIssue);
      document.getElementById('issue-id').value = issue?.id || '';
      document.getElementById('issue-title').value = issue?.title || '';
      document.getElementById('issue-status').value = issue?.status || STATUSES[0];
      document.getElementById('issue-priority').value = issue?.priority || PRIORITIES[1];
      document.getElementById('issue-category').value = issue?.category || '';
      document.getElementById('issue-tags').value = issue?.tags || '';
      document.getElementById('issue-phenomenon').value = issue?.phenomenon || '';
      document.getElementById('issue-solution').value = issue?.solution || '';
      document.getElementById('issue-conclusion').value = issue?.conclusion || '';
      modal.showModal();
    }

    function closeIssueModal() {
      modal.close();
    }

    async function loadIssues() {
      layout.content.querySelector('#issues-table-body').innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center">${t(TEXT.loading)}</td></tr>`;
      try {
        const token = AdminApp.getToken();
        const res = await fetch(API_ISSUES, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
        });
        if (!res.ok) throw new Error('Failed to load');
        allIssues = await res.json();
        updateCategoryFilter();
        applyFilters();
      } catch (err) {
        console.error('Load issues error:', err);
        layout.content.querySelector('#issues-table-body').innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-red-500">加载失败：${err.message}</td></tr>`;
      }
    }

    function updateCategoryFilter() {
      const categories = [...new Set(allIssues.map(issue => issue.category).filter(Boolean))];
      categoryFilter.innerHTML = `
        <option value="">${t(TEXT.filterByCategory)}</option>
        ${categories.map(category => `<option value="${category}">${category}</option>`).join('')}
      `;
    }

    function applyFilters() {
      filteredIssues = allIssues.filter(issue => {
        const matchSearch = !currentFilter.search ||
          issue.title.toLowerCase().includes(currentFilter.search.toLowerCase()) ||
          issue.phenomenon.toLowerCase().includes(currentFilter.search.toLowerCase()) ||
          issue.solution?.toLowerCase().includes(currentFilter.search.toLowerCase()) ||
          issue.conclusion?.toLowerCase().includes(currentFilter.search.toLowerCase());
        const matchStatus = !currentFilter.status || issue.status === currentFilter.status;
        const matchPriority = !currentFilter.priority || issue.priority === currentFilter.priority;
        const matchCategory = !currentFilter.category || issue.category === currentFilter.category;
        return matchSearch && matchStatus && matchPriority && matchCategory;
      });
      renderTable();
    }

    function renderTable() {
      const tbody = layout.content.querySelector('#issues-table-body');
      const empty = layout.content.querySelector('#empty-state');

      if (filteredIssues.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      tbody.innerHTML = filteredIssues.map(issue => `
        <tr class="group border-b border-gray-100 transition-colors hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-gray-800/50">
          <td class="px-4 py-3">
            <div class="font-medium">${escapeHtml(issue.title)}</div>
            <div class="text-xs text-gray-500">${escapeHtml(issue.phenomenon?.slice(0, 80) || '')}...</div>
          </td>
          <td class="px-4 py-3">
            <span class="status-badge status-${issue.status}">${t(TEXT.statuses[issue.status]?.zh || issue.status)}</span>
          </td>
          <td class="px-4 py-3">
            <span class="priority-badge priority-${issue.priority}">${t(TEXT.priorities[issue.priority]?.zh || issue.priority)}</span>
          </td>
          <td class="px-4 py-3 text-sm">${issue.category || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-500 hidden lg:table-cell">${formatDate(issue.createdAt)}</td>
          <td class="px-4 py-3">
            <div class="flex gap-2">
              <button class="text-indigo-500 hover:text-indigo-600" onclick="editIssue('${issue.id}')">${t(TEXT.edit)}</button>
              <button class="text-red-500 hover:text-red-600" onclick="deleteIssue('${issue.id}')">${t(TEXT.delete)}</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(dateString) {
      if (!dateString) return '-';
      const date = new Date(dateString);
      return date.toLocaleDateString('zh-CN');
    }

    async function saveIssue(formData) {
      const issue = {
        id: formData.get('id') || String(Date.now()),
        title: formData.get('title'),
        status: formData.get('status'),
        priority: formData.get('priority'),
        category: formData.get('category') || '',
        phenomenon: formData.get('phenomenon'),
        solution: formData.get('solution') || '',
        conclusion: formData.get('conclusion') || '',
        tags: formData.get('tags') || '',
        createdAt: formData.get('id') ? allIssues.find(i => i.id === formData.get('id'))?.createdAt : new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };

      const index = allIssues.findIndex(i => i.id === issue.id);
      if (index >= 0) {
        allIssues[index] = issue;
      } else {
        allIssues.push(issue);
      }

      try {
        const token = AdminApp.getToken();
        const res = await fetch(API_ISSUES, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify(allIssues),
        });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.message || 'Save failed');
        }
        alert(t(TEXT.saveSuccess));
        closeIssueModal();
        loadIssues();
      } catch (err) {
        console.error('Save error:', err);
        alert(t(TEXT.saveFailed) + ': ' + err.message);
      }
    }

    async function deleteIssue(id) {
      if (!confirm(t(TEXT.confirmDelete))) return;
      try {
        allIssues = allIssues.filter(i => i.id !== id);
        const token = AdminApp.getToken();
        const res = await fetch(API_ISSUES, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify(allIssues),
        });
        if (!res.ok) throw new Error('Delete failed');
        alert(t(TEXT.deleteSuccess));
        loadIssues();
      } catch (err) {
        alert(t(TEXT.deleteFailed) + ': ' + err.message);
      }
    }

    window.editIssue = (id) => {
      const issue = allIssues.find(i => i.id === id);
      if (issue) openIssueModal(issue);
    };

    window.deleteIssue = deleteIssue;

    searchInput.addEventListener('input', (e) => {
      currentFilter.search = e.target.value;
      applyFilters();
    });

    statusFilter.addEventListener('change', (e) => {
      currentFilter.status = e.target.value;
      applyFilters();
    });

    priorityFilter.addEventListener('change', (e) => {
      currentFilter.priority = e.target.value;
      applyFilters();
    });

    categoryFilter.addEventListener('change', (e) => {
      currentFilter.category = e.target.value;
      applyFilters();
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      saveIssue(formData);
    });

    loadIssues();
  </script>
</body>
</html>
