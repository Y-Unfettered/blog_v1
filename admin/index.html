<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLog Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#6366f1',
              dark: {
                100: '#1e293b',
                200: '#172033',
                300: '#0f1115',
                400: '#0a0c10',
              }
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }

      .gradient-bg {
        background:
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.16), transparent 34%),
          linear-gradient(135deg, #0f1115 0%, #1e293b 100%);
      }

      .glass-effect {
        background: rgba(17, 24, 39, 0.72);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      @keyframes slide-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-slide-up {
        animation: slide-up 0.45s ease-out;
      }
    </style>
  </head>
  <body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <button
      id="localeToggle"
      type="button"
      class="absolute right-4 top-4 rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-semibold text-white transition-colors hover:bg-white/10"
    ></button>

    <div class="w-full max-w-md animate-slide-up">
      <div class="mb-8 text-center">
        <div class="mb-4 inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-600 shadow-lg shadow-indigo-500/30">
          <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
          </svg>
        </div>
        <h1 class="mb-2 text-3xl font-bold text-white">DevLog</h1>
        <p id="heroDescription" class="text-gray-400"></p>
      </div>

      <div class="glass-effect rounded-2xl p-8">
        <div class="mb-6 text-center">
          <h2 id="formTitle" class="text-xl font-bold text-white"></h2>
          <p id="formDescription" class="mt-2 text-sm text-gray-400"></p>
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label id="usernameLabel" class="mb-2 block text-sm font-medium text-gray-400" for="username"></label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
              </div>
              <input
                type="text"
                id="username"
                required
                autocomplete="username"
                class="w-full rounded-xl border border-gray-700 bg-gray-800/50 py-3 pl-10 pr-4 text-white placeholder-gray-500 transition-all focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
              />
            </div>
          </div>

          <div>
            <label id="passwordLabel" class="mb-2 block text-sm font-medium text-gray-400" for="password"></label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
              </div>
              <input
                type="password"
                id="password"
                required
                autocomplete="current-password"
                class="w-full rounded-xl border border-gray-700 bg-gray-800/50 py-3 pl-10 pr-4 text-white placeholder-gray-500 transition-all focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
              />
            </div>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="flex w-full items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-3 font-medium text-white transition-all duration-200 hover:scale-[1.02] hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900"
          >
            <span id="btnText"></span>
            <svg id="btnIcon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
            </svg>
            <svg id="loadingIcon" class="hidden h-5 w-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </form>

        <div id="errorMsg" class="mt-4 hidden rounded-xl border border-red-500/20 bg-red-500/10 p-3">
          <div class="flex items-center gap-2 text-sm text-red-400">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span id="errorText"></span>
          </div>
        </div>
      </div>

      <div class="mt-6 text-center">
        <a href="/" class="inline-flex items-center gap-1 text-sm text-gray-500 transition-colors hover:text-gray-300">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          <span id="backToSite"></span>
        </a>
      </div>
    </div>

    <script>
      const STORAGE_LOCALE_KEY = 'admin-locale';
      const STORAGE_TOKEN_KEY = 'token';
      const copy = {
        zh: {
          pageTitle: 'DevLog 后台登录',
          heroDescription: '用于内容与站点配置的后台工作区',
          formTitle: '登录后台',
          formDescription: '使用当前部署配置的管理员账号登录。',
          usernameLabel: '用户名',
          usernamePlaceholder: '输入你的用户名',
          passwordLabel: '密码',
          passwordPlaceholder: '输入你的密码',
          submit: '登录',
          submitting: '登录中...',
          backToSite: '返回站点',
          toggleLabel: 'EN',
          toggleTitle: 'Switch to English',
          loginFailed: '登录失败，请检查用户名和密码。',
          networkError: '网络异常，请稍后再试。',
        },
        en: {
          pageTitle: 'DevLog Admin Login',
          heroDescription: 'Admin workspace for content and site configuration',
          formTitle: 'Sign in',
          formDescription: 'Use the administrator account configured for this deployment.',
          usernameLabel: 'Username',
          usernamePlaceholder: 'Enter your username',
          passwordLabel: 'Password',
          passwordPlaceholder: 'Enter your password',
          submit: 'Sign in',
          submitting: 'Signing in...',
          backToSite: 'Back to site',
          toggleLabel: '中',
          toggleTitle: '切换到中文',
          loginFailed: 'Login failed. Please check your username and password.',
          networkError: 'Network error. Please try again in a moment.',
        },
      };

      function getLocale() {
        return localStorage.getItem(STORAGE_LOCALE_KEY) === 'en' ? 'en' : 'zh';
      }

      function setLocale(locale) {
        const nextLocale = locale === 'en' ? 'en' : 'zh';
        localStorage.setItem(STORAGE_LOCALE_KEY, nextLocale);
        applyLocale(nextLocale);
      }

      function t(key, locale) {
        const activeLocale = locale || getLocale();
        return copy[activeLocale][key] || copy.en[key] || '';
      }

      function applyLocale(locale) {
        const activeLocale = locale || getLocale();
        document.documentElement.lang = activeLocale === 'en' ? 'en' : 'zh-CN';
        document.title = t('pageTitle', activeLocale);
        document.getElementById('heroDescription').textContent = t('heroDescription', activeLocale);
        document.getElementById('formTitle').textContent = t('formTitle', activeLocale);
        document.getElementById('formDescription').textContent = t('formDescription', activeLocale);
        document.getElementById('usernameLabel').textContent = t('usernameLabel', activeLocale);
        document.getElementById('passwordLabel').textContent = t('passwordLabel', activeLocale);
        document.getElementById('username').placeholder = t('usernamePlaceholder', activeLocale);
        document.getElementById('password').placeholder = t('passwordPlaceholder', activeLocale);
        document.getElementById('backToSite').textContent = t('backToSite', activeLocale);
        document.getElementById('localeToggle').textContent = t('toggleLabel', activeLocale);
        document.getElementById('localeToggle').title = t('toggleTitle', activeLocale);
      }

      const token = String(localStorage.getItem(STORAGE_TOKEN_KEY) || '').trim();
      if (token) {
        window.location.replace('/admin/dashboard');
      }

      const loginForm = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');
      const loadingIcon = document.getElementById('loadingIcon');
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      const localeToggle = document.getElementById('localeToggle');

      function setSubmitting(submitting) {
        submitBtn.disabled = submitting;
        btnText.textContent = submitting ? t('submitting') : t('submit');
        btnIcon.classList.toggle('hidden', submitting);
        loadingIcon.classList.toggle('hidden', !submitting);
      }

      function showError(message) {
        errorText.textContent = message;
        errorMsg.classList.remove('hidden');
      }

      localeToggle.addEventListener('click', function handleLocaleToggle() {
        setLocale(getLocale() === 'en' ? 'zh' : 'en');
        setSubmitting(false);
      });

      loginForm.addEventListener('submit', async function handleSubmit(event) {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        errorMsg.classList.add('hidden');
        setSubmitting(true);

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password }),
          });

          const text = await response.text();
          const data = text ? JSON.parse(text) : null;

          if (!response.ok) {
            showError((data && (data.message || data.error)) || t('loginFailed'));
            return;
          }

          localStorage.setItem(STORAGE_TOKEN_KEY, data.token);
          window.location.href = '/admin/dashboard';
        } catch (error) {
          console.error('Login failed:', error);
          showError(t('networkError'));
        } finally {
          setSubmitting(false);
        }
      });

      applyLocale(getLocale());
      setSubmitting(false);
    </script>
  </body>
</html>
