version: '3'

services:
  blog-web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - blog-api
    restart: always

  blog-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      - HOST=0.0.0.0
      - PORT=3030
      - NODE_ENV=production
      - BLOG_DATA_DIR=/srv/blog-data
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - blog-data:/srv/blog-data
    restart: always

volumes:
  blog-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
